<!DOCTYPE html>
<html>
<head>
    <title>Task Tracker</title>
    <link rel="stylesheet" href="{{ url_for('static', path='style.css') }}">
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>Task Tracker</h1>
            <p class="subtitle">Add, view and complete your tasks using MongoDB storage.</p>

            <form action="/add-task" method="post" class="task-form">
                <input type="text" name="title" placeholder="Enter a new task..." required>
                <button type="submit">Add Task</button>
            </form>

            <h2>Tasks</h2>

            {% if tasks %}
                <ul class="task-list">
                    {% for task in tasks %}
                        <li class="task-item">
                            <span class="{% if task.done %}done{% endif %}">
                                {{ task.title }}
                            </span>

                            {% if task.done %}
                                <span class="badge completed">Done</span>
                            {% else %}
                                <a href="/done/{{ task.id }}" class="badge pending">Mark Done</a>
                            {% endif %}
                        </li>
                    {% endfor %}
                </ul>
            {% else %}
                <p class="empty">No tasks yet. Add your first task above.</p>
            {% endif %}
        </div>
    </div>
</body>
</html>
